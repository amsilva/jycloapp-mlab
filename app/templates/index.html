<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Jyclo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- CSS LOCAL -->
    <link rel="stylesheet" href="/static/css/style.css">

    <!-- GOOGLE FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Phosphor Icons (Modern & Minimalist) -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>

<body>

    <!-- Header Section -->
    <header class="app-header">
        <div class="logo">
            <i class="ph-fill ph-infinity"></i>
            <h1>Jyclo</h1>
        </div>
        <div class="header-actions">
            <button id="theme-toggle" class="icon-btn">
                <i class="ph ph-moon"></i>
            </button>
        </div>
    </header>

    <!-- App Container -->
    <main class="app-container">
        
        <!-- Gamification / Stats Panel -->
        <section class="stats-panel glass-panel">
            <div class="stat-box">
                <span class="stat-value" id="stat-longest">0h</span>
                <span class="stat-label">Recorde</span>
            </div>
            <div class="stat-divider"></div>
            <div class="stat-box">
                <span class="stat-value" id="stat-month">0</span>
                <span class="stat-label">Este Mês</span>
            </div>
            <div class="stat-divider"></div>
            <div class="stat-box">
                <span class="stat-value" id="stat-year">0</span>
                <span class="stat-label">Este Ano</span>
            </div>
            <div class="stat-divider"></div>
            <div class="stat-box">
                <span class="stat-value" id="stat-total">0</span>
                <span class="stat-label">Total</span>
            </div>
        </section>

        <!-- Timeline / Cards -->
        <section class="timeline">
            <div class="timeline-header">
                <h2>Seus Ciclos</h2>
            </div>
            
            <div id="cards-container" class="cards-container">
                <!-- Cards will be injected here by JS -->
                <div class="loading-state">
                    <i class="ph ph-spinner-gap ph-spin"></i>
                    <p>Carregando seus ciclos...</p>
                </div>
            </div>
        </section>

    </main>

    <!-- Floating Action Button -->
    <button id="btn-start-fast" class="fab">
        <i class="ph ph-plus"></i>
    </button>

    <!-- Modals -->

    <!-- START FAST MODAL -->
    <div id="modal-start" class="modal-backdrop hidden">
        <div class="modal glass-panel">
            <div class="modal-header">
                <h3>Iniciar Jejum</h3>
                <button class="icon-btn close-modal"><i class="ph ph-x"></i></button>
            </div>
            <div class="modal-body">
                <form id="form-start">
                    <div class="form-group">
                        <label>Tipo (Opcional)</label>
                        <select id="start-type">
                            <option value="refeicao">Refeição Principal</option>
                            <option value="lanche">Refeição leve</option>
                            <option value="guloseimas">Guloseimas</option>
                            <option value="bebidas">Bebidas</option>
                        </select>
                    </div>
                     <div class="form-group-inline">
                         <div class="form-group">
                            <label>Data</label>
                            <input type="date" id="start-date" required>
                         </div>
                         <div class="form-group">
                            <label>Hora</label>
                            <input type="time" id="start-time" required>
                         </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary close-modal">Cancelar</button>
                <button class="btn btn-primary" id="btn-confirm-start">Começar</button>
            </div>
        </div>
    </div>

    <!-- CLOSE FAST MODAL -->
    <div id="modal-close" class="modal-backdrop hidden">
        <div class="modal glass-panel">
            <div class="modal-header">
                <h3>Quebrar Jejum</h3>
                <button class="icon-btn close-modal"><i class="ph ph-x"></i></button>
            </div>
            <div class="modal-body">
                <p class="celebration-text">Parabéns! Você alcançou <strong id="close-duration">0h</strong> de jejum.</p>
                <form id="form-close">
                    <div class="form-group">
                        <label>Alimentação (Opcional)</label>
                        <select id="close-type">
                            <option value="">Nenhuma</option>
                            <option value="Refeição principal">Refeição Principal</option>
                            <option value="Refeição leve">Refeição leve</option>
                            <option value="Guloseimas">Guloseimas</option>
                            <option value="Bebidas">Bebidas</option>
                        </select>
                    </div>
                    <div class="form-group-inline">
                         <div class="form-group">
                            <label>Data de Encerramento (Opcional)</label>
                            <input type="date" id="close-date">
                         </div>
                         <div class="form-group">
                            <label>Hora de Encerramento (Opcional)</label>
                            <input type="time" id="close-time">
                         </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary close-modal">Continuar Jejum</button>
                <button class="btn btn-success" id="btn-confirm-close">Quebrar Jejum</button>
            </div>
        </div>
    </div>
    
    <!-- DELETE CONFIRM MODAL -->
    <div id="modal-delete" class="modal-backdrop hidden">
        <div class="modal glass-panel">
            <div class="modal-header">
                <h3>Excluir Ciclo</h3>
                <button class="icon-btn close-modal"><i class="ph ph-x"></i></button>
            </div>
            <div class="modal-body">
                <p>Tem certeza que deseja apagar este ciclo? Esta ação não pode ser desfeita.</p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary close-modal">Cancelar</button>
                <button class="btn btn-danger" id="btn-confirm-delete">Excluir</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast hidden">
        <i class="ph ph-check-circle" id="toast-icon"></i>
        <span id="toast-msg">Operação realizada com sucesso!</span>
    </div>

    <script src="/static/js/main.js"></script>
</body>
</html>
